name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode (Swift 6)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      # Gate the tag build on the same checks CI runs — a green branch build does not
      # protect a later tag build if package-specific breakage slips in.
      - name: Build & test
        run: |
          swift build
          swift test
          swift run CodingBar --self-test

      - name: Build CodingBar.app
        env:
          CODINGBAR_VERSION: ${{ github.ref_name }}
        run: ./Scripts/package.sh

      # package.sh already signs and runs `codesign --verify` (fatal). Re-assert it here
      # and confirm the packaged binary actually launches before we publish artifacts.
      # No `spctl --assess`: an ad-hoc signature (no Developer ID) is rejected by design.
      - name: Verify packaged app
        run: |
          codesign --verify --deep --strict dist/CodingBar.app
          dist/CodingBar.app/Contents/MacOS/CodingBar --self-test

      - name: Zip app bundle
        run: ditto -c -k --keepParent dist/CodingBar.app "dist/CodingBar-${{ github.ref_name }}.zip"

      - name: Build DMG
        run: |
          hdiutil create -volname CodingBar \
            -srcfolder dist/CodingBar.app \
            -ov -format UDZO \
            "dist/CodingBar-${{ github.ref_name }}.dmg"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "dist/CodingBar-${{ github.ref_name }}.zip" \
            "dist/CodingBar-${{ github.ref_name }}.dmg" \
            --title "CodingBar ${{ github.ref_name }}" \
            --generate-notes
